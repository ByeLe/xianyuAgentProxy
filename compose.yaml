services:
  agent-proxy:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 7892
      XIANYU_SEND_URL: http://xianyu-bridge:7893/xianyu/send
      THREAD_ANCHOR_STORE_PATH: /app/work/thread-anchors.json
    ports:
      - "${AGENT_PROXY_PORT:-7892}:7892"
    volumes:
      - ./work:/app/work
    restart: unless-stopped

  xianyu-bridge:
    build:
      context: ./docker/xianyu-bridge
      args:
        XIANYU_APIS_REPO: ${XIANYU_APIS_REPO:-https://github.com/cv-cat/XianYuApis.git}
        XIANYU_APIS_REF: ${XIANYU_APIS_REF:-master}
    env_file:
      - path: .env
        required: false
    environment:
      BRIDGE_HOST: 0.0.0.0
      BRIDGE_PORT: 7893
      PROXY_MESSAGE_URL: http://agent-proxy:7892/xianyu/message
      PROXY_INBOUND_TOKEN: ${XIANYU_INBOUND_TOKEN:-}
      BRIDGE_SEND_TOKEN: ${XIANYU_SEND_TOKEN:-}
    ports:
      - "${XIANYU_BRIDGE_PORT:-7893}:7893"
    depends_on:
      - agent-proxy
    restart: unless-stopped
